<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>People Directory</title>
    <style>
      :root {
        --bg: #f5efe4;
        --card: #fffdf8;
        --text: #24201b;
        --accent: #b45309;
        --border: #e8d8be;
        --muted: #6b5f53;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", sans-serif;
        background: radial-gradient(circle at top, #fff4d6 0%, var(--bg) 45%, #efe2cb 100%);
        color: var(--text);
      }

      main {
        max-width: 760px;
        margin: 64px auto;
        padding: 0 20px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 24px 60px rgba(66, 43, 8, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 40px;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.5;
        color: var(--muted);
      }

      code {
        background: #fff1d6;
        padding: 2px 6px;
        border-radius: 4px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 20px;
      }

      .button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: #fffdf8;
        font: inherit;
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.15s ease;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .button:disabled {
        opacity: 0.7;
        cursor: wait;
        transform: none;
      }

      .people-list {
        list-style: none;
        margin: 24px 0 0;
        padding: 0;
        display: grid;
        gap: 12px;
      }

      .person-card {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 18px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #fff8ec;
      }

      .person-card span {
        color: var(--muted);
        white-space: nowrap;
      }

      @media (max-width: 640px) {
        main {
          margin: 32px auto;
        }

        h1 {
          font-size: 32px;
        }

        .person-card {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1 id="title">Loading...</h1>
        <p>This page is rendered by the frontend and populated from PostgreSQL through the backend API.</p>
        <p>Backend endpoint: <code id="endpoint">/api/people</code></p>
        <div class="toolbar">
          <p>Use the button to create a new random record in PostgreSQL.</p>
          <button id="add-person" class="button" type="button">Add Random Person</button>
        </div>
        <ul id="people-list" class="people-list"></ul>
      </section>
    </main>
    <script src="/config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>

apiVersion: apps/v1
kind: Deployment
metadata:
  name: task3-backend
  namespace: task3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task3-backend
  template:
    metadata:
      labels:
        app: task3-backend
    spec:
      containers:
        - name: backend
          image: docker.io/moz1h1gh/task3-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: task3-app-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: task3-app-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: task3-app-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: task3-app-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_CONNECT_RETRIES
              value: "2"
            - name: POSTGRES_CONNECT_DELAY
              value: "1"
          startupProbe:
            httpGet:
              path: /startup
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: task3-backend
  namespace: task3
spec:
  selector:
    app: task3-backend
  ports:
    - port: 8080
      targetPort: 8080

server:
  port: 8080
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/shop}
    username: ${SPRING_DATASOURCE_USERNAME:shop}
    password: ${SPRING_DATASOURCE_PASSWORD:shop}
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
shop:
  queue:
    orders: ${SHOP_ORDERS_QUEUE:orders.queue}
  session-prefix: ${SHOP_SESSION_PREFIX:session:}
  cors:
    allowed-origin: ${SHOP_CORS_ALLOWED_ORIGIN:http://localhost:3000}
  cache:
    products-key: ${SHOP_PRODUCTS_CACHE_KEY:cache:products}
    products-ttl-seconds: ${SHOP_PRODUCTS_CACHE_TTL_SECONDS:60}
  minio:
    endpoint: ${SHOP_MINIO_ENDPOINT:http://minio:9000}
    access-key: ${SHOP_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${SHOP_MINIO_SECRET_KEY:minioadmin}
    bucket: ${SHOP_MINIO_BUCKET:shop-images}
    public-base-path: ${SHOP_MINIO_PUBLIC_BASE_PATH:/media}

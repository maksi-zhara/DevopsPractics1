<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello App</title>
    <style>
      :root {
        --bg: #f6f8fc;
        --card: #ffffff;
        --text: #14213d;
        --accent: #1d4ed8;
        --border: #dbe3f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        max-width: 760px;
        margin: 64px auto;
        padding: 0 20px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 20px 60px rgba(20, 33, 61, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 42px;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.5;
      }

      code {
        background: #eef2ff;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1 id="title">Loading...</h1>
        <p>This page is rendered by the frontend and populated from the backend API.</p>
        <p>Backend endpoint: <code id="endpoint">/api/hello</code></p>
      </section>
    </main>
    <script src="/config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>

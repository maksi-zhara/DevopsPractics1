services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hello-flask-backend
    environment:
      NAME: Lev
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hello-frontend
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://localhost:8080/api
    ports:
      - "8081:80"

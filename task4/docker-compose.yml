services:
  postgres:
    image: postgres:16-alpine
    container_name: task4-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: task4db
      POSTGRES_USER: task4user
      POSTGRES_PASSWORD: task4password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task4user -d task4db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task4-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: task4db
      POSTGRES_USER: task4user
      POSTGRES_PASSWORD: task4password
      POSTGRES_CONNECT_RETRIES: 20
      POSTGRES_CONNECT_DELAY: 2
    ports:
      - "8080:8080"
    networks:
      default: null

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task4-frontend
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://localhost:8080/api
    ports:
      - "8081:80"
    networks:
      default: null

volumes:
  postgres_data:
